name: W.A.2.K – Python Tools CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install mutagen pillow rich
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8 (critical errors only)
      run: |
        # Проверка критических ошибок (синтаксис, неопределённые переменные и т.д.)
        flake8 . \
          --count \
          --select=E9,F63,F7,F82 \
          --show-source \
          --statistics
        # Игнорируем F824 (global переменная используется корректно)
        flake8 . \
          --count \
          --exit-zero \
          --max-complexity=10 \
          --max-line-length=127 \
          --ignore=F824 \
          --statistics

    - name: Run basic import tests
      run: |
        python - <<EOF
        import sys
        print("Python version:", sys.version)
        print("Testing imports...")
        try:
            import mutagen
            print("✓ mutagen imported")
        except ImportError as e:
            print("✗ mutagen import failed:", e)
            sys.exit(1)
        try:
            from PIL import Image
            print("✓ Pillow imported")
        except ImportError as e:
            print("✗ Pillow import failed:", e)
            sys.exit(1)
        try:
            import rich
            print("✓ rich imported")
        except ImportError as e:
            print("✗ rich import failed:", e)
            sys.exit(1)
        print("All imports successful!")
        EOF

    - name: Run syntax check on all Python files
      run: |
        find . -name "*.py" -type f -exec python -m py_compile {} \;
        echo "All Python files passed syntax check!"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          ./*.log
          ./*.txt
        if-no-files-found: ignore
